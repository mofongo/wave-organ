<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Additive Synth</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030303; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2rem;
      background: rgba(0,0,0,0.92);
      z-index: 10;
    }
    #overlay h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.5em;
    }
    #overlay p {
      color: #555;
      font-size: 0.78rem;
      text-align: center;
      max-width: 400px;
      line-height: 2.2;
    }
    #startBtn {
      padding: 11px 44px;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      background: transparent;
      color: #fff;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.2s;
    }
    #startBtn:hover { background: #fff; color: #000; border-color: #fff; }

    #hud {
      position: fixed;
      bottom: 1.4rem;
      left: 1.4rem;
      color: #252525;
      font-size: 0.65rem;
      line-height: 2.4;
      pointer-events: none;
    }

    /* Harmonic spectrum display */
    #spectrum {
      position: fixed;
      bottom: 1.4rem;
      right: 1.4rem;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 64px;
      pointer-events: none;
    }
    .bar {
      width: 11px;
      background: #111;
      border-radius: 1px 1px 0 0;
      min-height: 2px;
      transition: background 0.08s;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>WAVE SYNTH</h1>
  <p>
    Additive synthesis driven by an animated wave shape.<br>
    Each peak activates a harmonic partial of A2 (110 Hz).
  </p>
  <button id="startBtn">INITIALIZE</button>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  MOVE MOUSE — wave height<br>
  CLICK — smooth / sharp
</div>

<div id="spectrum"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
<script>
// ═══ CONFIG ═══════════════════════════════════════════════════════════════════
const POINTS   = 10;
const BASE_HZ  = 110;                           // A2 fundamental
const PARTIALS = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // harmonic series → segments 1–9
const MAX_GAIN = 0.18;                          // per-oscillator ceiling (unscaled)

// ═══ PAPER.JS SETUP ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
paper.setup(canvas);

let center, W, H;
let isSmooth = true;
const wave   = new paper.Path();
let mousePos = paper.view.center.multiply(0.5);
let waveAmp  = paper.view.center.y;

wave.fillColor = new paper.Color({ hue: 160, saturation: 0.9, brightness: 0.55 });

function buildPath() {
  center = paper.view.center;
  W = paper.view.size.width;
  H = paper.view.size.height / 2;
  wave.segments = [];
  wave.add(paper.view.bounds.bottomLeft);
  for (let i = 1; i < POINTS; i++) {
    wave.add(new paper.Point(W / POINTS * i, center.y));
  }
  wave.add(paper.view.bounds.bottomRight);
  wave.fullySelected = true;
}
buildPath();

// Mouse / click via Paper.js Tool
const tool = new paper.Tool();
tool.onMouseMove = e => { mousePos = e.point; };
tool.onMouseDown = () => {
  isSmooth = !isSmooth;
  if (!isSmooth) wave.segments.forEach(s => { s.handleIn = s.handleOut = null; });
};

paper.view.onFrame = event => {
  // Smoothly track mouse y → wave amplitude
  waveAmp += (center.y - mousePos.y - waveAmp) / 10;

  // Animate interior segments
  for (let i = 1; i < POINTS; i++) {
    const seed = event.count + (i + i % 10) * 100;
    const sh   = Math.sin(seed / 200) * waveAmp;
    wave.segments[i].point.y = Math.sin(seed / 100) * sh + H;
  }
  if (isSmooth) wave.smooth({ type: 'continuous' });

  if (synthReady) tick();
};

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  paper.view.viewSize = new paper.Size(window.innerWidth, window.innerHeight);
  buildPath();
});

// ═══ SPECTRUM BARS UI ═════════════════════════════════════════════════════════
const specEl = document.getElementById('spectrum');
const bars = PARTIALS.map(h => {
  const b = document.createElement('div');
  b.className = 'bar';
  b.title = `${BASE_HZ * h} Hz`;
  specEl.appendChild(b);
  return b;
});

// ═══ WEB AUDIO ════════════════════════════════════════════════════════════════
let audioCtx, master, limiter;
let oscs = [], gains = [];
let synthReady = false;

function startAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Limiter — prevents clipping when many partials are active
  limiter = audioCtx.createDynamicsCompressor();
  limiter.threshold.value = -6;
  limiter.knee.value      = 3;
  limiter.ratio.value     = 20;
  limiter.attack.value    = 0.001;
  limiter.release.value   = 0.08;
  limiter.connect(audioCtx.destination);

  // Delay reverb tail
  const delay    = audioCtx.createDelay(1.0);
  const feedback = audioCtx.createGain();
  const wetGain  = audioCtx.createGain();
  delay.delayTime.value = 0.36;
  feedback.gain.value   = 0.35;
  wetGain.gain.value    = 0.18;
  delay.connect(feedback);
  feedback.connect(delay);
  delay.connect(wetGain);
  wetGain.connect(limiter);

  // Master
  master = audioCtx.createGain();
  master.gain.value = 0.65;
  master.connect(limiter);
  master.connect(delay); // feed delay with pre-limiter signal

  // One sine oscillator per harmonic partial
  PARTIALS.forEach(h => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type            = 'sine';
    osc.frequency.value = BASE_HZ * h;
    gain.gain.value     = 0;
    osc.connect(gain);
    gain.connect(master);
    osc.start();
    oscs.push(osc);
    gains.push(gain);
  });

  synthReady = true;
}

// Called every animation frame once audio is running
function tick() {
  const amp = Math.abs(waveAmp); // effective wave amplitude
  const now = audioCtx.currentTime;

  PARTIALS.forEach((h, i) => {
    // Interior segments are indices 1..9; PARTIALS maps 1:1
    const y         = wave.segments[i + 1].point.y;
    const deviation = center.y - y; // positive = above midline = visual peak

    // Only peaks above the centre contribute; scale by wave amplitude
    // and apply 1/h spectral roll-off for natural additive timbre
    let g = 0;
    if (deviation > 0 && amp > 8) {
      g = Math.min(deviation / amp, 1) * (MAX_GAIN / h);
    }

    gains[i].gain.setTargetAtTime(g, now, 0.06);

    // Spectrum bar: height and hue proportional to gain
    const maxG = MAX_GAIN / h;
    const pct  = g / maxG;
    bars[i].style.height     = `${Math.max(2, Math.round(pct * 60))}px`;
    bars[i].style.background = g > 0.001
      ? `hsl(${152 + i * 10}, 70%, ${22 + pct * 48}%)`
      : '#111';
  });
}

// ═══ BOOTSTRAP ════════════════════════════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  startAudio();
});
</script>
</body>
</html>

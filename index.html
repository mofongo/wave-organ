<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Organ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030303; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2rem;
      background: rgba(0,0,0,0.92);
      z-index: 10;
    }
    #overlay h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.5em;
    }
    #overlay p {
      color: #555;
      font-size: 0.78rem;
      text-align: center;
      max-width: 400px;
      line-height: 2.2;
    }
    #startBtn {
      padding: 11px 44px;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      background: transparent;
      color: #fff;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.2s;
    }
    #startBtn:hover { background: #fff; color: #000; border-color: #fff; }

    #hud {
      position: fixed;
      bottom: 140px;
      left: 1.4rem;
      color: #252525;
      font-size: 0.65rem;
      line-height: 2.4;
      pointer-events: none;
    }

    #speed-control {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #252525;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
    }
    #speedSlider {
      -webkit-appearance: none;
      width: 120px;
      height: 1px;
      background: #252525;
      outline: none;
      cursor: pointer;
    }
    #speedSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      background: #444;
      border-radius: 50%;
    }
    #speedSlider::-moz-range-thumb {
      width: 8px;
      height: 8px;
      background: #444;
      border: none;
      border-radius: 50%;
    }

    /* Mode toggle */
    #mode-toggle {
      position: fixed;
      top: 1.4rem;
      right: 1.4rem;
      display: flex;
    }
    #mode-toggle button {
      padding: 6px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      background: transparent;
      color: #555;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.18s;
    }
    #mode-toggle button:not(:last-child) { border-right: none; }
    #mode-toggle button.active { color: #ccc; border-color: #555; background: #0d0d0d; }
    #mode-toggle button:hover:not(.active) { color: #888; border-color: #444; }

    /* Harmonic spectrum display */
    #spectrum {
      position: fixed;
      bottom: 140px;
      right: 1.4rem;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 64px;
      pointer-events: none;
    }
    .bar {
      width: 11px;
      background: #111;
      border-radius: 1px 1px 0 0;
      min-height: 2px;
      transition: background 0.08s;
    }

    /* Tuning selector */
    #tuningSelect {
      position: fixed;
      top: 1.4rem;
      right: 1.4rem;
      background: transparent;
      border: none;
      border-bottom: 1px solid #252525;
      color: #252525;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      padding: 0 2px 3px 0;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: color 0.2s, border-color 0.2s;
    }
    #tuningSelect:hover { color: #666; border-bottom-color: #666; }
    #tuningSelect option { background: #0a0a0a; color: #aaa; letter-spacing: 0; }
    /* ── Step Sequencer ────────────────────────────────────── */
    #sequencer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 680px;
      max-width: calc(100vw - 2rem);
      background: rgba(8,8,8,0.92);
      border: 1px solid #1a1a1a;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      padding: 0;
      z-index: 5;
      font-family: 'Courier New', monospace;
      backdrop-filter: blur(8px);
    }
    #seq-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-bottom: 1px solid #1a1a1a;
    }
    #seq-tabs {
      display: flex;
      gap: 0;
    }
    #seq-tabs button {
      padding: 4px 12px;
      font-family: inherit;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      background: transparent;
      color: #444;
      border: 1px solid #222;
      cursor: pointer;
      transition: all 0.15s;
    }
    #seq-tabs button:not(:last-child) { border-right: none; }
    #seq-tabs button.active { color: #aaa; background: #151515; border-color: #333; }
    #seq-tabs button:hover:not(.active) { color: #666; }

    #seq-transport {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #seq-transport button {
      padding: 3px 10px;
      font-family: inherit;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      background: transparent;
      color: #555;
      border: 1px solid #222;
      cursor: pointer;
      transition: all 0.15s;
    }
    #seq-transport button:hover { color: #aaa; border-color: #444; }
    #seq-transport button.playing { color: #6fb89a; border-color: #3a6b54; }
    #seq-tempo {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #444;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
    }
    #seq-tempo input {
      width: 44px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #333;
      color: #888;
      font-family: inherit;
      font-size: 0.6rem;
      text-align: center;
      outline: none;
      padding: 1px 0;
    }
    #seq-tempo input:focus { border-bottom-color: #666; color: #ccc; }

    #seq-grid {
      display: flex;
      gap: 2px;
      padding: 8px 10px 10px;
      justify-content: center;
    }
    .seq-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
    }
    .seq-step-bar {
      width: 32px;
      height: 80px;
      background: #111;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      border: 1px solid #1a1a1a;
      transition: border-color 0.1s;
    }
    .seq-step.current .seq-step-bar {
      border-color: #3a6b54;
    }
    .seq-step-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1e5e3e;
      transition: height 0.08s, background 0.08s;
      border-radius: 0 0 1px 1px;
    }
    .seq-step.current .seq-step-fill {
      background: #3aa06a;
    }
    .seq-step-label {
      font-size: 0.48rem;
      color: #333;
      letter-spacing: 0.05em;
      user-select: none;
      height: 12px;
    }
    .seq-step.current .seq-step-label {
      color: #6fb89a;
    }

    #seq-step-count {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #444;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
    }
    #seq-step-count select, #seq-divider select {
      background: #0a0a0a;
      border: 1px solid #222;
      color: #888;
      font-family: inherit;
      font-size: 0.55rem;
      text-align: center;
      outline: none;
      padding: 2px 4px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    #seq-step-count select:hover, #seq-divider select:hover { border-color: #444; color: #ccc; }
    #seq-step-count select option, #seq-divider select option { background: #0a0a0a; color: #aaa; }

    #seq-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 10px 8px;
      color: #444;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
    }

    @media (max-width: 600px) {
      #hud {
        bottom: auto;
        top: 1.4rem;
        left: 1.4rem;
      }
      #spectrum {
        right: auto;
        left: 50%;
        transform: translateX(-50%);
      }
      #speed-control {
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(1.4rem + 64px + 0.8rem);
      }
      #sequencer { width: 100%; max-width: 100%; border-radius: 0; }
      .seq-step-bar { width: 18px; height: 60px; }
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>WAVE ORGAN</h1>
  <p>
    Additive synthesis driven by an animated wave shape.<br>
    Each peak activates a harmonic partial of A2 (110 Hz).
  </p>
  <button id="startBtn">INITIALIZE</button>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  MOVE MOUSE — wave height<br>
  CLICK — smooth / sharp
</div>

<div id="speed-control">
  <span id="speedLabel">SPEED</span>
  <input type="range" id="speedSlider" min="0.05" max="3" step="0.05" value="1">
  <span id="speedVal">1.00×</span>
</div>

<div id="mode-toggle">
  <button id="btnAdditive" class="active">ADDITIVE</button>
  <button id="btnWavetable">WAVETABLE</button>
  <button id="btnGravity">GRAVITY</button>
</div>

<div id="spectrum"></div>

<div id="sequencer">
  <div id="seq-header">
    <div id="seq-tabs">
      <button class="active" data-tab="pitch">PITCH</button>
      <button data-tab="length">LENGTH</button>
      <button data-tab="velocity">VELOCITY</button>
      <button data-tab="probability">PROB</button>
    </div>
    <div id="seq-transport">
      <div id="seq-step-count">
        STEPS <select id="stepCountInput"></select>
      </div>
      <div id="seq-tempo">
        BPM <input id="tempoInput" type="number" min="20" max="300" value="120">
      </div>
      <button id="seq-play">PLAY</button>
    </div>
  </div>
  <div id="seq-grid"></div>
  <div id="seq-divider">
    CLK DIV <select id="dividerSelect"></select>
  </div>
</div>

<select id="tuningSelect">
  <option>Harmonic Series</option>
  <option>Odd Harmonics</option>
  <option>Organ Drawbars</option>
  <option>Just Major</option>
  <option>Just Minor</option>
  <option>Fifths Stack</option>
  <option>Bell/Metallic</option>
  <option>Subharmonics</option>
</select>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
<script src="engine.js"></script>
<script>
// ═══ CONFIG ═══════════════════════════════════════════════════════════════════
const POINTS       = 10;
const PARTIALS     = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // harmonic series → segments 1–9
const N_SAMPLES    = 64;                            // DFT resolution for wavetable mode
const BALL_GRAVITY = 0.1;                           // px/frame² downward acceleration
const BALL_INTERVAL = 30;                           // frames between ball spawns

const TUNINGS = {
  'Harmonic Series': [1,    2,     3,     4,      5,      6,      7,       8,        9      ],
  'Odd Harmonics':   [1,    3,     5,     7,      9,      11,     13,      15,       17     ],
  'Organ Drawbars':  [0.5,  1,     1.5,   2,      3,      4,      5,       6,        8      ],
  'Just Major':      [1,    9/8,   5/4,   4/3,    3/2,    5/3,    15/8,    2,        9/4    ],
  'Just Minor':      [1,    9/8,   6/5,   4/3,    3/2,    8/5,    9/5,     2,        9/4    ],
  'Fifths Stack':    [1,    3/2,   9/4,   27/8,   81/16,  243/32, 729/64,  2187/128, 6561/256],
  'Bell/Metallic':   [1,    2.756, 5.404, 8.933,  13.344, 18.641, 24.82,   31.87,    39.784 ],
  'Subharmonics':    [2,    1,     2/3,   1/2,    2/5,    1/3,    2/7,     1/4,      2/9    ],
};

// ═══ ENGINE ════════════════════════════════════════════════════════════════════
const engine = new WaveOrganEngine({ baseHz: 110, partials: PARTIALS });

// ═══ PAPER.JS SETUP ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
paper.setup(canvas);

let center, W, H;
let isSmooth  = true;
let speed     = 1;
let timeAccum = 0;
let synthMode = 'additive';
let balls     = [];
let ballTimer = 0;
const wave   = new paper.Path();
let mousePos = paper.view.center.multiply(0.5);
let waveAmp  = paper.view.center.y;

wave.fillColor = new paper.Color({ hue: 160, saturation: 0.9, brightness: 0.55 });

function buildPath() {
  center = paper.view.center;
  W = paper.view.size.width;
  H = paper.view.size.height / 2;
  wave.segments = [];
  wave.add(paper.view.bounds.bottomLeft);
  for (let i = 1; i < POINTS; i++) {
    wave.add(new paper.Point(W / POINTS * i, center.y));
  }
  wave.add(paper.view.bounds.bottomRight);
  wave.fullySelected = true;
}
buildPath();

// ═══ GRAVITY MODE — BALL PHYSICS ══════════════════════════════════════════════

// Interpolate wave Y at an arbitrary x position using the interior segments.
function waveYAt(x) {
  const segW = W / POINTS;
  const t    = x / segW;
  const lo   = Math.max(1, Math.min(Math.floor(t), POINTS - 1));
  const hi   = Math.min(lo + 1, POINTS - 1);
  const frac = t - Math.floor(t);
  return wave.segments[lo].point.y * (1 - frac) + wave.segments[hi].point.y * frac;
}

function spawnBall() {
  const x      = (0.1 + Math.random() * 0.8) * W;
  const r      = 4 + Math.random() * 4;
  const circle = new paper.Path.Circle(new paper.Point(x, -r), r);
  circle.fillColor = new paper.Color({ hue: 160, saturation: 0.6, brightness: 0.4 });
  balls.push({ x, y: -r, vx: (Math.random() - 0.5) * 1.5, vy: 1 + Math.random() * 1.5, r, alpha: 1, fading: false, circle });
}

function updateBalls() {
  for (const b of balls) {
    if (b.fading) {
      b.alpha -= 0.07; // fade out over ~14 frames
    } else {
      b.vy += BALL_GRAVITY;
      b.x  += b.vx;
      b.y  += b.vy;
      if (b.y + b.r >= waveYAt(b.x)) b.fading = true;
    }
    b.circle.position        = new paper.Point(b.x, b.y);
    b.circle.fillColor.alpha = Math.max(0, b.alpha);
  }
  balls = balls.filter(b => {
    if (b.alpha <= 0 || b.y > paper.view.size.height + 20) { b.circle.remove(); return false; }
    return true;
  });
}

// Each ball above the midline pulls the nearest wave segments upward.
// The pull grows as the ball falls closer to the wave surface.
// `speed` (driven by the slider) scales the pull strength.
function applyBallsToWave() {
  const segW = W / POINTS;
  for (let i = 1; i < POINTS; i++) {
    const sx = segW * i;
    let pull = 0;
    for (const b of balls) {
      if (b.y < 0 || b.y >= H) continue;
      const proxX = Math.max(0, 1 - Math.abs(b.x - sx) / (segW * 1.5));
      const proxY = b.y / H; // 0 at top → 1 at midline
      pull += proxX * proxY;
    }
    const targetY = H - Math.min(pull * speed, 1) * H * 0.85;
    wave.segments[i].point.y += (targetY - wave.segments[i].point.y) * 0.15;
  }
  if (isSmooth) wave.smooth({ type: 'continuous' });
}

function clearGravity() {
  balls.forEach(b => b.circle.remove());
  balls     = [];
  ballTimer = 0;
}

// Mouse / click via Paper.js Tool
const tool = new paper.Tool();
tool.onMouseMove = e => { mousePos = e.point; };
tool.onMouseDown = () => {
  isSmooth = !isSmooth;
  if (!isSmooth) wave.segments.forEach(s => { s.handleIn = s.handleOut = null; });
};

paper.view.onFrame = () => {
  waveAmp += (center.y - mousePos.y - waveAmp) / 10;

  if (synthMode === 'gravity') {
    ballTimer++;
    if (ballTimer >= BALL_INTERVAL) { ballTimer = 0; spawnBall(); }
    updateBalls();
    applyBallsToWave();
  } else {
    timeAccum += speed;
    for (let i = 1; i < POINTS; i++) {
      const seed = timeAccum + (i + i % 10) * 100;
      const sh   = Math.sin(seed / 200) * waveAmp;
      wave.segments[i].point.y = Math.sin(seed / 100) * sh + H;
    }
    if (isSmooth) wave.smooth({ type: 'continuous' });
  }

  if (engine.isReady) tick();
};

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  paper.view.viewSize = new paper.Size(window.innerWidth, window.innerHeight);
  buildPath();
});

// ═══ WAVETABLE SAMPLING ════════════════════════════════════════════════════════
// Reads the 9 interior segment Y values and linearly interpolates them to
// N_SAMPLES, normalised to [-1, 1] relative to the midline.
function sampleWave() {
  const pts = [];
  for (let i = 1; i < POINTS; i++) {
    const dev = center.y - wave.segments[i].point.y;
    pts.push(Math.max(-1, Math.min(dev / H, 1)));
  }
  const samples = new Float32Array(N_SAMPLES);
  const M = pts.length; // POINTS - 1 = 9
  for (let j = 0; j < N_SAMPLES; j++) {
    const t  = (j / N_SAMPLES) * (M - 1);
    const lo = Math.floor(t);
    const hi = Math.min(lo + 1, M - 1);
    samples[j] = pts[lo] + (t - lo) * (pts[hi] - pts[lo]);
  }
  return samples;
}

// ═══ SPECTRUM BARS UI ═════════════════════════════════════════════════════════
const specEl = document.getElementById('spectrum');
const bars = PARTIALS.map(h => {
  const b = document.createElement('div');
  b.className = 'bar';
  b.title = `${engine.baseHz * h} Hz`;
  specEl.appendChild(b);
  return b;
});

// ═══ WAVE UI TICK ══════════════════════════════════════════════════════════════
function tick() {
  const amp = Math.abs(waveAmp);

  if (synthMode === 'additive' || synthMode === 'gravity') {
    const activations = PARTIALS.map((h, i) => {
      const y         = wave.segments[i + 1].point.y;
      const deviation = center.y - y;
      if (synthMode === 'gravity') return deviation > 0 ? Math.min(deviation / H, 1) : 0;
      return (deviation > 0 && amp > 8) ? Math.min(deviation / H, 1) : 0;
    });

    engine.setActivations(activations);

    activations.forEach((pct, i) => {
      bars[i].style.height     = `${Math.max(2, Math.round(pct * 60))}px`;
      bars[i].style.background = pct > 0.01
        ? `hsl(${152 + i * 10}, 70%, ${22 + pct * 48}%)`
        : '#111';
    });

  } else {
    // Wavetable: wave shape becomes the oscillator's single-cycle waveform.
    // Amplitude tracks the tallest deviation from the midline, same scale as additive.
    let maxDev = 0;
    for (let i = 1; i < POINTS; i++) {
      const dev = Math.abs(center.y - wave.segments[i].point.y);
      if (dev > maxDev) maxDev = dev;
    }
    const amplitude = amp > 8 ? Math.min(maxDev / H, 1) : 0;

    engine.setWaveShape(sampleWave(), amplitude);

    // Single level bar — one oscillator, not 9 partials
    bars.forEach((bar, i) => {
      if (i === 0) {
        bar.style.height     = `${Math.max(2, Math.round(amplitude * 60))}px`;
        bar.style.background = amplitude > 0.01 ? `hsl(152, 70%, ${22 + amplitude * 48}%)` : '#111';
      } else {
        bar.style.height     = '2px';
        bar.style.background = '#111';
      }
    });
  }
}

// ═══ SPEED SLIDER ═════════════════════════════════════════════════════════════
const speedSlider = document.getElementById('speedSlider');
const speedVal    = document.getElementById('speedVal');
const speedLabel  = document.getElementById('speedLabel');

function updateSliderLabel() {
  const v = parseFloat(speedSlider.value);
  if (synthMode === 'gravity') {
    speedLabel.textContent = 'PULL';
    speedVal.textContent   = v.toFixed(2);
  } else {
    speedLabel.textContent = 'SPEED';
    speedVal.textContent   = `${v.toFixed(2)}×`;
  }
}

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  updateSliderLabel();
});

// ═══ MODE TOGGLE ══════════════════════════════════════════════════════════════
const btnAdditive  = document.getElementById('btnAdditive');
const btnWavetable = document.getElementById('btnWavetable');
const btnGravity   = document.getElementById('btnGravity');

function updateModeButtons(mode) {
  btnAdditive.classList.toggle('active',  mode === 'additive');
  btnWavetable.classList.toggle('active', mode === 'wavetable');
  btnGravity.classList.toggle('active',   mode === 'gravity');
}

// ═══ TUNING ════════════════════════════════════════════════════════════════════
const tuningSelect = document.getElementById('tuningSelect');

function applyTuning(name) {
  const ratios = TUNINGS[name];
  if (engine.isReady) engine.setRatios(ratios);
  bars.forEach((b, i) => { b.title = `${(engine.baseHz * ratios[i]).toFixed(1)} Hz`; });
}

tuningSelect.addEventListener('change', e => applyTuning(e.target.value));
btnAdditive.addEventListener('click', () => {
  if (synthMode === 'additive') return;
  if (synthMode === 'gravity') clearGravity();
  synthMode = 'additive';
  engine.setMode('additive');
  updateModeButtons('additive');
  updateSliderLabel();
});

btnWavetable.addEventListener('click', () => {
  if (synthMode === 'wavetable') return;
  if (synthMode === 'gravity') clearGravity();
  synthMode = 'wavetable';
  engine.setMode('wavetable');
  updateModeButtons('wavetable');
  updateSliderLabel();
});

btnGravity.addEventListener('click', () => {
  if (synthMode === 'gravity') return;
  synthMode = 'gravity';
  engine.setMode('additive'); // gravity uses additive synthesis
  updateModeButtons('gravity');
  updateSliderLabel();
  // Reset wave to midline so balls start from a clean state
  for (let i = 1; i < POINTS; i++) wave.segments[i].point.y = center.y;
});

// ═══ STEP SEQUENCER ═══════════════════════════════════════════════════════════

const SEQ_NOTES = [
  'C2','D2','E2','F2','G2','A2','B2',
  'C3','D3','E3','F3','G3','A3','B3',
  'C4','D4','E4','F4','G4','A4','B4',
  'C5',
];
const SEQ_FREQS = [
  65.41,73.42,82.41,87.31,98.00,110.00,123.47,
  130.81,146.83,164.81,174.61,196.00,220.00,246.94,
  261.63,293.66,329.63,349.23,392.00,440.00,493.88,
  523.25,
];
const SEQ_LENGTHS = [0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.4, 0.5, 0.6, 0.8, 1.0];

// Clock divider options: value = number of master ticks per step advance.
// Triplet divisions fit 3 in the space of 2, so multiplied by 2/3.
const DIVISIONS = [
  { label: '/1',   value: 1 },
  { label: '/2',   value: 2 },
  { label: '/2T',  value: 1.333 },
  { label: '/3',   value: 3 },
  { label: '/3T',  value: 2 },
  { label: '/4',   value: 4 },
  { label: '/4T',  value: 2.667 },
  { label: '/5',   value: 5 },
  { label: '/6',   value: 6 },
  { label: '/6T',  value: 4 },
  { label: '/7',   value: 7 },
  { label: '/8',   value: 8 },
  { label: '/8T',  value: 5.333 },
  { label: '/9',   value: 9 },
];

const seq = {
  numSteps: 16,
  bpm: 120,
  playing: false,
  masterTick: 0,
  intervalId: null,
  activeTab: 'pitch',
  pitch:       Array(32).fill(7),
  length:      Array(32).fill(4),
  velocity:    Array(32).fill(8),
  probability: Array(32).fill(10),
  // Per-tab clock division (index into DIVISIONS)
  division: { pitch: 0, length: 0, velocity: 0, probability: 0 },
  // Per-tab accumulated ticks and current step position
  accum:    { pitch: 0, length: 0, velocity: 0, probability: 0 },
  step:     { pitch: -1, length: -1, velocity: -1, probability: -1 },
};

const seqGrid        = document.getElementById('seq-grid');
const seqPlayBtn     = document.getElementById('seq-play');
const tempoInput     = document.getElementById('tempoInput');
const stepCountInput = document.getElementById('stepCountInput');
const dividerSelect  = document.getElementById('dividerSelect');
const seqTabs        = document.querySelectorAll('#seq-tabs button');

// Populate steps dropdown (2–16)
for (let n = 2; n <= 16; n++) {
  const opt = document.createElement('option');
  opt.value = n; opt.textContent = n;
  if (n === 16) opt.selected = true;
  stepCountInput.appendChild(opt);
}

// Populate clock divider dropdown
DIVISIONS.forEach((d, idx) => {
  const opt = document.createElement('option');
  opt.value = idx; opt.textContent = d.label;
  dividerSelect.appendChild(opt);
});

function syncDividerSelect() {
  dividerSelect.value = seq.division[seq.activeTab];
}

function seqTabConfig(tab) {
  switch (tab) {
    case 'pitch':       return { data: seq.pitch,       max: SEQ_NOTES.length - 1, labelFn: i => SEQ_NOTES[seq.pitch[i]] };
    case 'length':      return { data: seq.length,      max: SEQ_LENGTHS.length - 1, labelFn: i => SEQ_LENGTHS[seq.length[i]].toFixed(2) };
    case 'velocity':    return { data: seq.velocity,    max: 10, labelFn: i => seq.velocity[i] };
    case 'probability': return { data: seq.probability, max: 10, labelFn: i => (seq.probability[i] * 10) + '%' };
  }
}

function buildSeqGrid() {
  seqGrid.innerHTML = '';
  const cfg = seqTabConfig(seq.activeTab);
  for (let i = 0; i < seq.numSteps; i++) {
    const step = document.createElement('div');
    step.className = 'seq-step' + (i === seq.step[seq.activeTab] ? ' current' : '');
    step.dataset.index = i;

    const bar = document.createElement('div');
    bar.className = 'seq-step-bar';
    const fill = document.createElement('div');
    fill.className = 'seq-step-fill';
    fill.style.height = ((cfg.data[i] / cfg.max) * 100) + '%';
    bar.appendChild(fill);

    const label = document.createElement('div');
    label.className = 'seq-step-label';
    label.textContent = cfg.labelFn(i);

    step.appendChild(bar);
    step.appendChild(label);
    seqGrid.appendChild(step);

    // Drag interaction for setting step values
    let dragging = false;
    const setFromY = (e) => {
      const rect = bar.getBoundingClientRect();
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const pct = 1 - Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
      cfg.data[i] = Math.round(pct * cfg.max);
      fill.style.height = ((cfg.data[i] / cfg.max) * 100) + '%';
      label.textContent = cfg.labelFn(i);
    };
    bar.addEventListener('mousedown', (e) => { dragging = true; setFromY(e); e.preventDefault(); });
    bar.addEventListener('touchstart', (e) => { dragging = true; setFromY(e); e.preventDefault(); }, { passive: false });
    const onMove = (e) => { if (dragging) setFromY(e); };
    const onUp = () => { dragging = false; };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp);
  }
}

function updateSeqHighlight() {
  const steps = seqGrid.querySelectorAll('.seq-step');
  const cur = seq.step[seq.activeTab];
  steps.forEach((s, i) => s.classList.toggle('current', i === cur));
}

seqTabs.forEach(btn => {
  btn.addEventListener('click', () => {
    seqTabs.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    seq.activeTab = btn.dataset.tab;
    buildSeqGrid();
    syncDividerSelect();
  });
});

tempoInput.addEventListener('change', () => {
  seq.bpm = Math.max(20, Math.min(300, parseInt(tempoInput.value) || 120));
  tempoInput.value = seq.bpm;
  if (seq.playing) { stopSeq(); startSeq(); }
});

stepCountInput.addEventListener('change', () => {
  seq.numSteps = parseInt(stepCountInput.value) || 16;
  buildSeqGrid();
  if (seq.playing) { stopSeq(); startSeq(); }
});

dividerSelect.addEventListener('change', () => {
  seq.division[seq.activeTab] = parseInt(dividerSelect.value);
});

function advanceTab(tab) {
  const div = DIVISIONS[seq.division[tab]].value;
  seq.accum[tab] += 1;
  if (seq.accum[tab] >= div) {
    seq.accum[tab] -= div;
    seq.step[tab] = (seq.step[tab] + 1) % seq.numSteps;
    return true;
  }
  return false;
}

function seqTick() {
  seq.masterTick++;

  // Advance each tab independently according to its clock divider
  const pitchAdvanced = advanceTab('pitch');
  advanceTab('length');
  advanceTab('velocity');
  advanceTab('probability');

  updateSeqHighlight();

  // Trigger a note when the pitch sequencer advances
  if (!pitchAdvanced) return;

  const pi = seq.step.pitch;
  const li = seq.step.length;
  const vi = seq.step.velocity;
  const ri = seq.step.probability;

  const prob = seq.probability[ri] / 10;
  if (Math.random() > prob) return;

  const vel  = seq.velocity[vi] / 10;
  const freq = SEQ_FREQS[seq.pitch[pi]];
  const dur  = SEQ_LENGTHS[seq.length[li]];
  engine.playNote(freq, vel, dur);
}

function startSeq() {
  const msPerStep = (60 / seq.bpm) * 1000 / 4; // master clock = 16th notes
  seq.intervalId = setInterval(seqTick, msPerStep);
  seq.playing = true;
  seqPlayBtn.textContent = 'STOP';
  seqPlayBtn.classList.add('playing');
}

function stopSeq() {
  clearInterval(seq.intervalId);
  seq.intervalId = null;
  seq.playing = false;
  seq.masterTick = 0;
  for (const tab of ['pitch','length','velocity','probability']) {
    seq.step[tab] = -1;
    seq.accum[tab] = 0;
  }
  seqPlayBtn.textContent = 'PLAY';
  seqPlayBtn.classList.remove('playing');
  updateSeqHighlight();
}

seqPlayBtn.addEventListener('click', () => {
  if (seq.playing) stopSeq(); else startSeq();
});

buildSeqGrid();

// ═══ BOOTSTRAP ════════════════════════════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  engine.start();
  applyTuning(tuningSelect.value);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Organ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030303; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2rem;
      background: rgba(0,0,0,0.92);
      z-index: 10;
    }
    #overlay h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.5em;
    }
    #overlay p {
      color: #555;
      font-size: 0.78rem;
      text-align: center;
      max-width: 400px;
      line-height: 2.2;
    }
    #startBtn {
      padding: 11px 44px;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      background: transparent;
      color: #fff;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.2s;
    }
    #startBtn:hover { background: #fff; color: #000; border-color: #fff; }

    #hud {
      position: fixed;
      bottom: 1.4rem;
      left: 1.4rem;
      color: #252525;
      font-size: 0.65rem;
      line-height: 2.4;
      pointer-events: none;
    }

    /* Harmonic spectrum display */
    #spectrum {
      position: fixed;
      bottom: 1.4rem;
      right: 1.4rem;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 64px;
      pointer-events: none;
    }
    .bar {
      width: 11px;
      background: #111;
      border-radius: 1px 1px 0 0;
      min-height: 2px;
      transition: background 0.08s;
    }

    /* Tuning selector */
    #tuningSelect {
      position: fixed;
      top: 1.4rem;
      right: 1.4rem;
      background: transparent;
      border: none;
      border-bottom: 1px solid #252525;
      color: #252525;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      padding: 0 2px 3px 0;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: color 0.2s, border-color 0.2s;
    }
    #tuningSelect:hover { color: #666; border-bottom-color: #666; }
    #tuningSelect option { background: #0a0a0a; color: #aaa; letter-spacing: 0; }
  </style>
</head>
<body>

<div id="overlay">
  <h1>WAVE ORGAN</h1>
  <p>
    Additive synthesis driven by an animated wave shape.<br>
    Each peak activates a harmonic partial of A2 (110 Hz).
  </p>
  <button id="startBtn">INITIALIZE</button>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  MOVE MOUSE — wave height<br>
  CLICK — smooth / sharp
</div>

<div id="spectrum"></div>

<select id="tuningSelect">
  <option>Harmonic Series</option>
  <option>Odd Harmonics</option>
  <option>Organ Drawbars</option>
  <option>Just Major</option>
  <option>Just Minor</option>
  <option>Fifths Stack</option>
  <option>Bell/Metallic</option>
  <option>Subharmonics</option>
</select>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
<script src="engine.js"></script>
<script>
// ═══ CONFIG ═══════════════════════════════════════════════════════════════════
const POINTS   = 10;
const PARTIALS = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // 9 partials → wave segments 1–9

const TUNINGS = {
  'Harmonic Series': [1,    2,     3,     4,      5,      6,      7,       8,        9      ],
  'Odd Harmonics':   [1,    3,     5,     7,      9,      11,     13,      15,       17     ],
  'Organ Drawbars':  [0.5,  1,     1.5,   2,      3,      4,      5,       6,        8      ],
  'Just Major':      [1,    9/8,   5/4,   4/3,    3/2,    5/3,    15/8,    2,        9/4    ],
  'Just Minor':      [1,    9/8,   6/5,   4/3,    3/2,    8/5,    9/5,     2,        9/4    ],
  'Fifths Stack':    [1,    3/2,   9/4,   27/8,   81/16,  243/32, 729/64,  2187/128, 6561/256],
  'Bell/Metallic':   [1,    2.756, 5.404, 8.933,  13.344, 18.641, 24.82,   31.87,    39.784 ],
  'Subharmonics':    [2,    1,     2/3,   1/2,    2/5,    1/3,    2/7,     1/4,      2/9    ],
};

// ═══ ENGINE ════════════════════════════════════════════════════════════════════
const engine = new WaveOrganEngine({ baseHz: 110, partials: PARTIALS });

// ═══ PAPER.JS SETUP ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
paper.setup(canvas);

let center, W, H;
let isSmooth = true;
const wave   = new paper.Path();
let mousePos = paper.view.center.multiply(0.5);
let waveAmp  = paper.view.center.y;

wave.fillColor = new paper.Color({ hue: 160, saturation: 0.9, brightness: 0.55 });

function buildPath() {
  center = paper.view.center;
  W = paper.view.size.width;
  H = paper.view.size.height / 2;
  wave.segments = [];
  wave.add(paper.view.bounds.bottomLeft);
  for (let i = 1; i < POINTS; i++) {
    wave.add(new paper.Point(W / POINTS * i, center.y));
  }
  wave.add(paper.view.bounds.bottomRight);
  wave.fullySelected = true;
}
buildPath();

// Mouse / click via Paper.js Tool
const tool = new paper.Tool();
tool.onMouseMove = e => { mousePos = e.point; };
tool.onMouseDown = () => {
  isSmooth = !isSmooth;
  if (!isSmooth) wave.segments.forEach(s => { s.handleIn = s.handleOut = null; });
};

paper.view.onFrame = event => {
  // Smoothly track mouse y → wave amplitude
  waveAmp += (center.y - mousePos.y - waveAmp) / 10;

  // Animate interior segments
  for (let i = 1; i < POINTS; i++) {
    const seed = event.count + (i + i % 10) * 100;
    const sh   = Math.sin(seed / 200) * waveAmp;
    wave.segments[i].point.y = Math.sin(seed / 100) * sh + H;
  }
  if (isSmooth) wave.smooth({ type: 'continuous' });

  if (engine.isReady) tick();
};

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  paper.view.viewSize = new paper.Size(window.innerWidth, window.innerHeight);
  buildPath();
});

// ═══ SPECTRUM BARS UI ═════════════════════════════════════════════════════════
const specEl = document.getElementById('spectrum');
const bars = PARTIALS.map(h => {
  const b = document.createElement('div');
  b.className = 'bar';
  b.title = `${engine.baseHz * h} Hz`;
  specEl.appendChild(b);
  return b;
});

// ═══ WAVE UI TICK ══════════════════════════════════════════════════════════════
// Reads the current wave shape, computes a per-partial activation level (0–1),
// passes it to the engine, and updates the spectrum bars to match.
function tick() {
  const amp = Math.abs(waveAmp);

  const activations = PARTIALS.map((h, i) => {
    const y         = wave.segments[i + 1].point.y;
    const deviation = center.y - y; // positive = above midline = visual peak
    return (deviation > 0 && amp > 8) ? Math.min(deviation / amp, 1) : 0;
  });

  engine.setActivations(activations);

  // Spectrum bars: height and hue proportional to activation
  activations.forEach((pct, i) => {
    bars[i].style.height     = `${Math.max(2, Math.round(pct * 60))}px`;
    bars[i].style.background = pct > 0.01
      ? `hsl(${152 + i * 10}, 70%, ${22 + pct * 48}%)`
      : '#111';
  });
}

// ═══ TUNING ════════════════════════════════════════════════════════════════════
const tuningSelect = document.getElementById('tuningSelect');

function applyTuning(name) {
  const ratios = TUNINGS[name];
  if (engine.isReady) engine.setRatios(ratios);
  bars.forEach((b, i) => { b.title = `${(engine.baseHz * ratios[i]).toFixed(1)} Hz`; });
}

tuningSelect.addEventListener('change', e => applyTuning(e.target.value));

// ═══ BOOTSTRAP ════════════════════════════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  engine.start();
  applyTuning(tuningSelect.value);
});
</script>
</body>
</html>

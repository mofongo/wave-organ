<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Organ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030303; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2rem;
      background: rgba(0,0,0,0.92);
      z-index: 10;
    }
    #overlay h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.5em;
    }
    #overlay p {
      color: #555;
      font-size: 0.78rem;
      text-align: center;
      max-width: 400px;
      line-height: 2.2;
    }
    #startBtn {
      padding: 11px 44px;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      background: transparent;
      color: #fff;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.2s;
    }
    #startBtn:hover { background: #fff; color: #000; border-color: #fff; }

    #hud {
      position: fixed;
      bottom: 1.4rem;
      left: 1.4rem;
      color: #252525;
      font-size: 0.65rem;
      line-height: 2.4;
      pointer-events: none;
    }

    #speed-control {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #252525;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
    }
    #speedSlider {
      -webkit-appearance: none;
      width: 120px;
      height: 1px;
      background: #252525;
      outline: none;
      cursor: pointer;
    }
    #speedSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      background: #444;
      border-radius: 50%;
    }
    #speedSlider::-moz-range-thumb {
      width: 8px;
      height: 8px;
      background: #444;
      border: none;
      border-radius: 50%;
    }

    /* Harmonic spectrum display */
    #spectrum {
      position: fixed;
      bottom: 1.4rem;
      right: 1.4rem;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 64px;
      pointer-events: none;
    }
    .bar {
      width: 11px;
      background: #111;
      border-radius: 1px 1px 0 0;
      min-height: 2px;
      transition: background 0.08s;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>WAVE ORGAN</h1>
  <p>
    Additive synthesis driven by an animated wave shape.<br>
    Each peak activates a harmonic partial of A2 (110 Hz).
  </p>
  <button id="startBtn">INITIALIZE</button>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  MOVE MOUSE — wave height<br>
  CLICK — smooth / sharp
</div>

<div id="speed-control">
  SPEED
  <input type="range" id="speedSlider" min="0.05" max="3" step="0.05" value="1">
  <span id="speedVal">1.00×</span>
</div>

<div id="spectrum"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
<script src="engine.js"></script>
<script>
// ═══ CONFIG ═══════════════════════════════════════════════════════════════════
const POINTS   = 10;
const PARTIALS = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // harmonic series → segments 1–9

// ═══ ENGINE ════════════════════════════════════════════════════════════════════
const engine = new WaveOrganEngine({ baseHz: 110, partials: PARTIALS });

// ═══ PAPER.JS SETUP ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
paper.setup(canvas);

let center, W, H;
let isSmooth = true;
let speed    = 1;
let timeAccum = 0;
const wave   = new paper.Path();
let mousePos = paper.view.center.multiply(0.5);
let waveAmp  = paper.view.center.y;

wave.fillColor = new paper.Color({ hue: 160, saturation: 0.9, brightness: 0.55 });

function buildPath() {
  center = paper.view.center;
  W = paper.view.size.width;
  H = paper.view.size.height / 2;
  wave.segments = [];
  wave.add(paper.view.bounds.bottomLeft);
  for (let i = 1; i < POINTS; i++) {
    wave.add(new paper.Point(W / POINTS * i, center.y));
  }
  wave.add(paper.view.bounds.bottomRight);
  wave.fullySelected = true;
}
buildPath();

// Mouse / click via Paper.js Tool
const tool = new paper.Tool();
tool.onMouseMove = e => { mousePos = e.point; };
tool.onMouseDown = () => {
  isSmooth = !isSmooth;
  if (!isSmooth) wave.segments.forEach(s => { s.handleIn = s.handleOut = null; });
};

paper.view.onFrame = () => {
  // Smoothly track mouse y → wave amplitude
  waveAmp += (center.y - mousePos.y - waveAmp) / 10;

  timeAccum += speed;

  // Animate interior segments
  for (let i = 1; i < POINTS; i++) {
    const seed = timeAccum + (i + i % 10) * 100;
    const sh   = Math.sin(seed / 200) * waveAmp;
    wave.segments[i].point.y = Math.sin(seed / 100) * sh + H;
  }
  if (isSmooth) wave.smooth({ type: 'continuous' });

  if (engine.isReady) tick();
};

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  paper.view.viewSize = new paper.Size(window.innerWidth, window.innerHeight);
  buildPath();
});

// ═══ SPECTRUM BARS UI ═════════════════════════════════════════════════════════
const specEl = document.getElementById('spectrum');
const bars = PARTIALS.map(h => {
  const b = document.createElement('div');
  b.className = 'bar';
  b.title = `${engine.baseHz * h} Hz`;
  specEl.appendChild(b);
  return b;
});

// ═══ WAVE UI TICK ══════════════════════════════════════════════════════════════
// Reads the current wave shape, computes a per-partial activation level (0–1),
// passes it to the engine, and updates the spectrum bars to match.
function tick() {
  const amp = Math.abs(waveAmp);

  const activations = PARTIALS.map((h, i) => {
    const y         = wave.segments[i + 1].point.y;
    const deviation = center.y - y; // positive = above midline = visual peak
    return (deviation > 0 && amp > 8) ? Math.min(deviation / H, 1) : 0;
  });

  engine.setActivations(activations);

  // Spectrum bars: height and hue proportional to activation
  activations.forEach((pct, i) => {
    bars[i].style.height     = `${Math.max(2, Math.round(pct * 60))}px`;
    bars[i].style.background = pct > 0.01
      ? `hsl(${152 + i * 10}, 70%, ${22 + pct * 48}%)`
      : '#111';
  });
}

// ═══ SPEED SLIDER ═════════════════════════════════════════════════════════════
const speedSlider = document.getElementById('speedSlider');
const speedVal    = document.getElementById('speedVal');
speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  speedVal.textContent = `${speed.toFixed(2)}×`;
});

// ═══ BOOTSTRAP ════════════════════════════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  engine.start();
});
</script>
</body>
</html>

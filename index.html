<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Organ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030303; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2rem;
      background: rgba(0,0,0,0.92);
      z-index: 10;
    }
    #overlay h1 {
      color: #fff;
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.5em;
    }
    #overlay p {
      color: #555;
      font-size: 0.78rem;
      text-align: center;
      max-width: 400px;
      line-height: 2.2;
    }
    #startBtn {
      padding: 11px 44px;
      font-family: inherit;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      background: transparent;
      color: #fff;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.2s;
    }
    #startBtn:hover { background: #fff; color: #000; border-color: #fff; }

    #hud {
      position: fixed;
      bottom: 1.4rem;
      left: 1.4rem;
      color: #252525;
      font-size: 0.65rem;
      line-height: 2.4;
      pointer-events: none;
    }

    #speed-control {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: #252525;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
    }
    #speedSlider {
      -webkit-appearance: none;
      width: 120px;
      height: 1px;
      background: #252525;
      outline: none;
      cursor: pointer;
    }
    #speedSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 8px;
      height: 8px;
      background: #444;
      border-radius: 50%;
    }
    #speedSlider::-moz-range-thumb {
      width: 8px;
      height: 8px;
      background: #444;
      border: none;
      border-radius: 50%;
    }

    /* Mode toggle */
    #mode-toggle {
      position: fixed;
      top: 1.4rem;
      right: 1.4rem;
      display: flex;
    }
    #mode-toggle button {
      padding: 6px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      background: transparent;
      color: #252525;
      border: 1px solid #1c1c1c;
      cursor: pointer;
      transition: all 0.18s;
    }
    #mode-toggle button:not(:last-child) { border-right: none; }
    #mode-toggle button.active { color: #ccc; border-color: #333; background: #0d0d0d; }
    #mode-toggle button:hover:not(.active) { color: #555; border-color: #2a2a2a; }

    /* Harmonic spectrum display */
    #spectrum {
      position: fixed;
      bottom: 1.4rem;
      right: 1.4rem;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 64px;
      pointer-events: none;
    }
    .bar {
      width: 11px;
      background: #111;
      border-radius: 1px 1px 0 0;
      min-height: 2px;
      transition: background 0.08s;
    }

    @media (max-width: 600px) {
      #hud {
        bottom: auto;
        top: 1.4rem;
        left: 1.4rem;
      }
      #spectrum {
        right: auto;
        left: 50%;
        transform: translateX(-50%);
      }
      #speed-control {
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(1.4rem + 64px + 0.8rem);
      }
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>WAVE ORGAN</h1>
  <p>
    Additive synthesis driven by an animated wave shape.<br>
    Each peak activates a harmonic partial of A2 (110 Hz).
  </p>
  <button id="startBtn">INITIALIZE</button>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  MOVE MOUSE — wave height<br>
  CLICK — smooth / sharp
</div>

<div id="speed-control">
  <span id="speedLabel">SPEED</span>
  <input type="range" id="speedSlider" min="0.05" max="3" step="0.05" value="1">
  <span id="speedVal">1.00×</span>
</div>

<div id="mode-toggle">
  <button id="btnAdditive" class="active">ADDITIVE</button>
  <button id="btnWavetable">WAVETABLE</button>
  <button id="btnGravity">GRAVITY</button>
</div>

<div id="spectrum"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
<script src="engine.js"></script>
<script>
// ═══ CONFIG ═══════════════════════════════════════════════════════════════════
const POINTS       = 10;
const PARTIALS     = [1, 2, 3, 4, 5, 6, 7, 8, 9]; // harmonic series → segments 1–9
const N_SAMPLES    = 64;                            // DFT resolution for wavetable mode
const BALL_GRAVITY = 0.1;                           // px/frame² downward acceleration
const BALL_INTERVAL = 30;                           // frames between ball spawns

// ═══ ENGINE ════════════════════════════════════════════════════════════════════
const engine = new WaveOrganEngine({ baseHz: 110, partials: PARTIALS });

// ═══ PAPER.JS SETUP ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
paper.setup(canvas);

let center, W, H;
let isSmooth  = true;
let speed     = 1;
let timeAccum = 0;
let synthMode = 'additive';
let balls     = [];
let ballTimer = 0;
const wave   = new paper.Path();
let mousePos = paper.view.center.multiply(0.5);
let waveAmp  = paper.view.center.y;

wave.fillColor = new paper.Color({ hue: 160, saturation: 0.9, brightness: 0.55 });

function buildPath() {
  center = paper.view.center;
  W = paper.view.size.width;
  H = paper.view.size.height / 2;
  wave.segments = [];
  wave.add(paper.view.bounds.bottomLeft);
  for (let i = 1; i < POINTS; i++) {
    wave.add(new paper.Point(W / POINTS * i, center.y));
  }
  wave.add(paper.view.bounds.bottomRight);
  wave.fullySelected = true;
}
buildPath();

// ═══ GRAVITY MODE — BALL PHYSICS ══════════════════════════════════════════════

// Interpolate wave Y at an arbitrary x position using the interior segments.
function waveYAt(x) {
  const segW = W / POINTS;
  const t    = x / segW;
  const lo   = Math.max(1, Math.min(Math.floor(t), POINTS - 1));
  const hi   = Math.min(lo + 1, POINTS - 1);
  const frac = t - Math.floor(t);
  return wave.segments[lo].point.y * (1 - frac) + wave.segments[hi].point.y * frac;
}

// Elastic ball-ball collision resolution (equal mass, restitution 0.75).
function resolveCollisions() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      const a = balls[i], b = balls[j];
      const dx   = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const min  = a.r + b.r;
      if (dist >= min || dist === 0) continue;
      const nx = dx / dist, ny = dy / dist;
      // Separate overlapping circles
      const overlap = (min - dist) * 0.5;
      a.x -= nx * overlap; a.y -= ny * overlap;
      b.x += nx * overlap; b.y += ny * overlap;
      // Impulse (approaching only)
      const dvn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
      if (dvn >= 0) continue;
      const J = -(1 + 0.75) * dvn / 2;
      a.vx -= J * nx; a.vy -= J * ny;
      b.vx += J * nx; b.vy += J * ny;
    }
  }
}

function spawnBall() {
  const x      = (0.1 + Math.random() * 0.8) * W;
  const r      = 4 + Math.random() * 4;
  const circle = new paper.Path.Circle(new paper.Point(x, -r), r);
  circle.fillColor = new paper.Color({ hue: 160, saturation: 0.6, brightness: 0.4 });
  balls.push({ x, y: -r, vx: (Math.random() - 0.5) * 1.5, vy: 1 + Math.random() * 1.5, r, life: 480, circle });
}

function updateBalls() {
  // Physics + collisions
  for (const b of balls) {
    b.vy += BALL_GRAVITY;
    b.x  += b.vx;
    b.y  += b.vy;
    // Side walls
    if (b.x - b.r < 0) { b.x = b.r;     b.vx =  Math.abs(b.vx) * 0.75; }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -Math.abs(b.vx) * 0.75; }
    // Top wall
    if (b.y - b.r < 0) { b.y = b.r;     b.vy =  Math.abs(b.vy) * 0.6;  }
    // Wave surface
    const wy = waveYAt(b.x);
    if (b.y + b.r >= wy && b.vy > 0) {
      b.y  = wy - b.r;
      b.vy = -Math.abs(b.vy) * 0.6;
      b.vx *= 0.85;
    }
  }
  resolveCollisions();
  // Update visuals and expire
  balls = balls.filter(b => {
    b.life--;
    b.circle.position = new paper.Point(b.x, b.y);
    if (b.y > paper.view.size.height + 20 || b.life <= 0) { b.circle.remove(); return false; }
    return true;
  });
}

// Each ball above the midline pulls the nearest wave segments upward.
// The pull grows as the ball falls closer to the wave surface.
// `speed` (driven by the slider) scales the pull strength.
function applyBallsToWave() {
  const segW = W / POINTS;
  for (let i = 1; i < POINTS; i++) {
    const sx = segW * i;
    let pull = 0;
    for (const b of balls) {
      if (b.y < 0 || b.y >= H) continue;
      const proxX = Math.max(0, 1 - Math.abs(b.x - sx) / (segW * 1.5));
      const proxY = b.y / H; // 0 at top → 1 at midline
      pull += proxX * proxY;
    }
    const targetY = H - Math.min(pull * speed, 1) * H * 0.85;
    wave.segments[i].point.y += (targetY - wave.segments[i].point.y) * 0.15;
  }
  if (isSmooth) wave.smooth({ type: 'continuous' });
}

function clearGravity() {
  balls.forEach(b => b.circle.remove());
  balls     = [];
  ballTimer = 0;
}

// Mouse / click via Paper.js Tool
const tool = new paper.Tool();
tool.onMouseMove = e => { mousePos = e.point; };
tool.onMouseDown = () => {
  isSmooth = !isSmooth;
  if (!isSmooth) wave.segments.forEach(s => { s.handleIn = s.handleOut = null; });
};

paper.view.onFrame = () => {
  waveAmp += (center.y - mousePos.y - waveAmp) / 10;

  if (synthMode === 'gravity') {
    ballTimer++;
    if (ballTimer >= BALL_INTERVAL) { ballTimer = 0; spawnBall(); }
    updateBalls();
    applyBallsToWave();
  } else {
    timeAccum += speed;
    for (let i = 1; i < POINTS; i++) {
      const seed = timeAccum + (i + i % 10) * 100;
      const sh   = Math.sin(seed / 200) * waveAmp;
      wave.segments[i].point.y = Math.sin(seed / 100) * sh + H;
    }
    if (isSmooth) wave.smooth({ type: 'continuous' });
  }

  if (engine.isReady) tick();
};

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  paper.view.viewSize = new paper.Size(window.innerWidth, window.innerHeight);
  buildPath();
});

// ═══ WAVETABLE SAMPLING ════════════════════════════════════════════════════════
// Reads the 9 interior segment Y values and linearly interpolates them to
// N_SAMPLES, normalised to [-1, 1] relative to the midline.
function sampleWave() {
  const pts = [];
  for (let i = 1; i < POINTS; i++) {
    const dev = center.y - wave.segments[i].point.y;
    pts.push(Math.max(-1, Math.min(dev / H, 1)));
  }
  const samples = new Float32Array(N_SAMPLES);
  const M = pts.length; // POINTS - 1 = 9
  for (let j = 0; j < N_SAMPLES; j++) {
    const t  = (j / N_SAMPLES) * (M - 1);
    const lo = Math.floor(t);
    const hi = Math.min(lo + 1, M - 1);
    samples[j] = pts[lo] + (t - lo) * (pts[hi] - pts[lo]);
  }
  return samples;
}

// ═══ SPECTRUM BARS UI ═════════════════════════════════════════════════════════
const specEl = document.getElementById('spectrum');
const bars = PARTIALS.map(h => {
  const b = document.createElement('div');
  b.className = 'bar';
  b.title = `${engine.baseHz * h} Hz`;
  specEl.appendChild(b);
  return b;
});

// ═══ WAVE UI TICK ══════════════════════════════════════════════════════════════
function tick() {
  const amp = Math.abs(waveAmp);

  if (synthMode === 'additive' || synthMode === 'gravity') {
    const activations = PARTIALS.map((h, i) => {
      const y         = wave.segments[i + 1].point.y;
      const deviation = center.y - y;
      if (synthMode === 'gravity') return deviation > 0 ? Math.min(deviation / H, 1) : 0;
      return (deviation > 0 && amp > 8) ? Math.min(deviation / H, 1) : 0;
    });

    engine.setActivations(activations);

    activations.forEach((pct, i) => {
      bars[i].style.height     = `${Math.max(2, Math.round(pct * 60))}px`;
      bars[i].style.background = pct > 0.01
        ? `hsl(${152 + i * 10}, 70%, ${22 + pct * 48}%)`
        : '#111';
    });

  } else {
    // Wavetable: wave shape becomes the oscillator's single-cycle waveform.
    // Amplitude tracks the tallest deviation from the midline, same scale as additive.
    let maxDev = 0;
    for (let i = 1; i < POINTS; i++) {
      const dev = Math.abs(center.y - wave.segments[i].point.y);
      if (dev > maxDev) maxDev = dev;
    }
    const amplitude = amp > 8 ? Math.min(maxDev / H, 1) : 0;

    engine.setWaveShape(sampleWave(), amplitude);

    // Single level bar — one oscillator, not 9 partials
    bars.forEach((bar, i) => {
      if (i === 0) {
        bar.style.height     = `${Math.max(2, Math.round(amplitude * 60))}px`;
        bar.style.background = amplitude > 0.01 ? `hsl(152, 70%, ${22 + amplitude * 48}%)` : '#111';
      } else {
        bar.style.height     = '2px';
        bar.style.background = '#111';
      }
    });
  }
}

// ═══ SPEED SLIDER ═════════════════════════════════════════════════════════════
const speedSlider = document.getElementById('speedSlider');
const speedVal    = document.getElementById('speedVal');
const speedLabel  = document.getElementById('speedLabel');

function updateSliderLabel() {
  const v = parseFloat(speedSlider.value);
  if (synthMode === 'gravity') {
    speedLabel.textContent = 'PULL';
    speedVal.textContent   = v.toFixed(2);
  } else {
    speedLabel.textContent = 'SPEED';
    speedVal.textContent   = `${v.toFixed(2)}×`;
  }
}

speedSlider.addEventListener('input', () => {
  speed = parseFloat(speedSlider.value);
  updateSliderLabel();
});

// ═══ MODE TOGGLE ══════════════════════════════════════════════════════════════
const btnAdditive  = document.getElementById('btnAdditive');
const btnWavetable = document.getElementById('btnWavetable');
const btnGravity   = document.getElementById('btnGravity');

function updateModeButtons(mode) {
  btnAdditive.classList.toggle('active',  mode === 'additive');
  btnWavetable.classList.toggle('active', mode === 'wavetable');
  btnGravity.classList.toggle('active',   mode === 'gravity');
}

btnAdditive.addEventListener('click', () => {
  if (synthMode === 'additive') return;
  if (synthMode === 'gravity') clearGravity();
  synthMode = 'additive';
  engine.setMode('additive');
  updateModeButtons('additive');
  updateSliderLabel();
});

btnWavetable.addEventListener('click', () => {
  if (synthMode === 'wavetable') return;
  if (synthMode === 'gravity') clearGravity();
  synthMode = 'wavetable';
  engine.setMode('wavetable');
  updateModeButtons('wavetable');
  updateSliderLabel();
});

btnGravity.addEventListener('click', () => {
  if (synthMode === 'gravity') return;
  synthMode = 'gravity';
  engine.setMode('additive'); // gravity uses additive synthesis
  updateModeButtons('gravity');
  updateSliderLabel();
  // Reset wave to midline so balls start from a clean state
  for (let i = 1; i < POINTS; i++) wave.segments[i].point.y = center.y;
});

// ═══ BOOTSTRAP ════════════════════════════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  engine.start();
});
</script>
</body>
</html>
